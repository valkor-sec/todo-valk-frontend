<!DOCTYPE html>
<html>
<head>
    <title>Todo-Valk - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
      <a href="index.html" class="accueil"><strong>ACCUEIL</strong></a>
<div class="container">

    <h1>Todo-Valk 🔐</h1>

    <div class="card">
        <h2>Connexion</h2>

        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Mot de passe">

        <button onclick="login()">Se connecter</button>

        <p style="margin-top:10px;">
            Pas de compte ? <a href="register.html">Créer un compte</a>
        </p>
    </div>

</div>

<script>
    console.log("JS CHARGÉ");

    async function login() {
        try {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const res = await fetch("https://todo-valk-api.onrender.com/api/auth/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            console.log("LOGIN RESPONSE:", data);

            if (data.token) {
                localStorage.setItem("token", data.token);
                alert("Connexion réussie 🔥");
                window.location.href = "dashboard.html";
            } else {
                alert(data.message || "Erreur login");
            }

        } catch (err) {
            console.log("ERROR LOGIN:", err);
            alert("Erreur serveur ou backend non connecté");
        }
    }
</script>

</body>
</html>
